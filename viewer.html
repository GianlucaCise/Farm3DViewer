<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Farm Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header id="header">
    <h1>⛏ MC Farm Viewer</h1>
    <div id="farm-name" style="color:var(--text2); font-size:12px;"></div>
    <div id="farm-meta">
      <span class="badge" id="badge-edition"></span>
      <span class="badge" id="badge-version"></span>
      <span class="badge green" id="badge-diff"></span>
    </div>
  </header>

  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>

    <div id="controls-bar">
      <label>Layer</label>
      <input type="range" id="layer-slider" min="0" max="4" value="4" step="1">
      <span id="layer-label">Tutti</span>
      <div style="width:1px;height:16px;background:var(--border2)"></div>
      <button class="ctrl-btn" id="btn-wireframe">Wireframe</button>
      <button class="ctrl-btn" id="btn-reset-cam">Reset cam</button>
    </div>

    <div id="error-banner"></div>
    <div id="tooltip"></div>
  </div>

  <aside id="sidebar">
    <div id="tabs">
      <div class="tab active" data-tab="materials">Materiali</div>
      <div class="tab" data-tab="steps">Guida</div>
      <div class="tab" data-tab="info">Info</div>
    </div>

    <div class="panel active" id="panel-materials">
      <div id="mat-header">
        <span id="progress-text">0 / 0</span>
        <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      </div>
      <div id="mat-list"></div>
      <button id="mat-reset">↺ Reset checklist</button>
    </div>

    <div class="panel" id="panel-steps">
      <div id="steps-list"></div>
    </div>

    <div class="panel" id="panel-info">
      <div id="info-panel"></div>
    </div>
  </aside>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="farms/sugarcane.js"></script>
<script src="viewer.js"></script>
</body>
</html>
